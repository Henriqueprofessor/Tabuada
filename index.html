<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maratona da Tabuada Específica ⏱️</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 450px; margin: 20px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #barra-tempo { width: 100%; height: 15px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        #progresso { width: 100%; height: 100%; background: #28a745; transition: width 0.1s linear; }
        #pergunta { font-size: 42px; font-weight: bold; margin: 20px 0; color: #333; }
        .status-jogo { display: flex; justify-content: space-between; font-weight: bold; color: #555; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .abas-filtro { display: flex; gap: 5px; margin-top: 15px; }
        .aba { flex: 1; padding: 8px; font-size: 13px; background: #e0e0e0; border: none; color: #333; border-radius: 4px; }
        .aba.ativa { background: #007bff; color: white; }
    </style>
</head>
<body>

    <!-- TELA 1: CADASTRO DO ALUNO E ESCOLHA DA TABUADA -->
    <div id="tela-registro" class="card">
        <h2>Maratona da Tabuada 🏆</h2>
        <p>Escolha qual tabuada você quer treinar hoje:</p>
        <input type="text" id="nome-aluno" placeholder="Digite seu nome (Ex: João Silva)">
        
        <label for="selecao-tabuada" style="display:block; text-align:left; font-weight:bold; margin-top:10px;">Treinar Tabuada do:</label>
        <select id="selecao-tabuada">
            <option value="2">Tabuada do 2</option>
            <option value="3">Tabuada do 3</option>
            <option value="4">Tabuada do 4</option>
            <option value="5">Tabuada do 5</option>
            <option value="6">Tabuada do 6</option>
            <option value="7">Tabuada do 7</option>
            <option value="8">Tabuada do 8</option>
            <option value="9">Tabuada do 9</option>
        </select>

        <button onclick="registrarAluno()">Iniciar Desafio</button>
    </div>

    <!-- TELA 2: O JOGO (CIRCUITO) -->
    <div id="tela-jogo" class="card hidden">
        <div class="status-jogo">
            <span id="info-pergunta">Pergunta: 1 / 10</span>
            <span id="info-pontos">Pontos: 0</span>
        </div>
        <div id="barra-tempo"><div id="progresso"></div></div>
        <div id="pergunta">X × Y = ?</div>
        <input type="number" id="resposta" placeholder="Sua resposta..." autocomplete="off">
        <button onclick="verificarResposta()">Responder (Enter)</button>
    </div>

    <!-- TELA 3: RANKING FINAL DA TABUADA SELECIONADA -->
    <div id="tela-ranking" class="card hidden">
        <h2 id="titulo-ranking">Ranking - Tabuada do X</h2>
        <p id="feedback-pontos"></p>
        
        <!-- Filtros do Ranking -->
        <div class="abas-filtro">
            <button class="aba ativa" id="btn-filtro-pontos" onclick="mudarFiltro('pontos')">Maior Pontuação</button>
            <button class="aba" id="btn-filtro-velocidade" onclick="mudarFiltro('velocidade')">Mais Rápido (Tempo)</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Nome</th>
                    <th id="coluna-criterio">Pontos Total</th>
                </tr>
            </thead>
            <tbody id="tabela-ranking"></tbody>
        </table>
        <button onclick="reiniciarJogo()" style="background: #28a745; margin-top: 20px;">Jogar Novamente</button>
    </div>

    <script>
        let alunoAtual = "";
        let tabuadaSelecionada = 2;
        let numAleatorio, respostaCorreta;
        let tempoInicio, temporizadorInterval, temporizadorTimeout;
        
        let perguntaAtual = 0;
        let pontosAcumulados = 0;
        let temposRespostasCorretas = [];
        let filtroAtual = "pontos";

        const TOTAL_PERGUNTAS = 10;
        const TEMPO_MAXIMO = 7000;

        document.getElementById('resposta').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarResposta();
        });

        function registrarAluno() {
            const inputNome = document.getElementById('nome-aluno').value.trim();
            if (!inputNome) return alert("Por favor, digite seu nome!");
            
            alunoAtual = inputNome;
            tabuadaSelecionada = parseInt(document.getElementById('selecao-tabuada').value);
            
            perguntaAtual = 0;
            pontosAcumulados = 0;
            temposRespostasCorretas = [];

            document.getElementById('tela-registro').classList.add('hidden');
            document.getElementById('tela-jogo').classList.remove('hidden');
            proximaPergunta();
        }

        function proximaPergunta() {
            perguntaAtual++;
            
            if (perguntaAtual > TOTAL_PERGUNTAS) {
                finalizarCircuito();
                return;
            }

            document.getElementById('info-pergunta').innerText = `Pergunta: ${perguntaAtual} / ${TOTAL_PERGUNTAS}`;
            document.getElementById('info-pontos').innerText = `Pontos: ${pontosAcumulados}`;

            numAleatorio = Math.floor(Math.random() * 10) + 1;
            respostaCorreta = tabuadaSelecionada * numAleatorio;

            document.getElementById('pergunta').innerText = `${tabuadaSelecionada} × ${numAleatorio} = ?`;
            document.getElementById('resposta').value = "";
            document.getElementById('resposta').focus();

            iniciarCronometro();
        }

        function iniciarCronometro() {
            tempoInicio = performance.now();
            const progresso = document.getElementById('progresso');
            progresso.style.width = "100%";
            progresso.style.background = "#28a745";

            let tempoRestante = TEMPO_MAXIMO;
            
            clearInterval(temporizadorInterval);
            temporizadorInterval = setInterval(() => {
                tempoRestante -= 100;
                const porcentagem = (tempoRestante / TEMPO_MAXIMO) * 100;
                progresso.style.width = `${porcentagem}%`;
                if (porcentagem < 40) progresso.style.background = "#dc3545";
            }, 100);

            clearTimeout(temporizadorTimeout);
            temporizadorTimeout = setTimeout(() => {
                 processarResposta(0);
            }, TEMPO_MAXIMO);
        }

        function verificarResposta() {
            clearInterval(temporizadorInterval);
            clearTimeout(temporizadorTimeout);

            const tempoFim = performance.now();
            const respostaAluno = parseInt(document.getElementById('resposta').value);
            const tempoGasto = (tempoFim - tempoInicio) / 1000;

            if (respostaAluno === respostaCorreta && tempoGasto <= 7) {
                const pontosDestaRodada = Math.round((7 - tempoGasto) * 100);
                temposRespostasCorretas.push(tempoGasto);
                processarResposta(pontosDestaRodada);
            } else {
                processarResposta(0);
            }
        }

        function processarResposta(pontosGanhos) {
            pontosAcumulados += pontosGanhos;
            proximaPergunta();
        }

        function finalizarCircuito() {
            document.getElementById('tela-jogo').classList.add('hidden');
            document.getElementById('tela-ranking').classList.remove('hidden');
            document.getElementById('titulo-ranking').innerText = `Ranking - Tabuada do ${tabuadaSelecionada}`;

            let tempoMedio = 7; 
            if(temposRespostasCorretas.length > 0) {
                const somaTempos = temposRespostasCorretas.reduce((a, b) => a + b, 0);
                tempoMedio = somaTempos / temposRespostasCorretas.length;
            }
            
            document.getElementById('feedback-pontos').innerText = `Parabéns, ${alunoAtual}!\nVocê fez ${pontosAcumulados} pontos.\nTempo médio de acerto: ${tempoMedio.toFixed(2)}s`;

            salvarPontuacao(alunoAtual, pontosAcumulados, tempoMedio, tabuadaSelecionada);
            exibirRanking();
        }

        function salvarPontuacao(nome, pontos, tempoMedio, tabuada) {
            const chaveRanking = `rankingTabuada_${tabuada}`;
            let ranking = JSON.parse(localStorage.getItem(chaveRanking)) || [];
            
            ranking.push({ nome: nome, pontos: pontos, tempoMedio: tempoMedio });
            localStorage.setItem(chaveRanking, JSON.stringify(ranking));
        }

        function mudarFiltro(novoFiltro) {
            filtroAtual = novoFiltro;
            document.getElementById('btn-filtro-pontos').classList.toggle('ativa', filtroAtual === 'pontos');
            document.getElementById('btn-filtro-velocidade').classList.toggle('ativa', filtroAtual === 'velocidade');
            exibirRanking();
        }

        function exibirRanking() {
            const chaveRanking = `rankingTabuada_${tabuadaSelecionada}`;
            let ranking = JSON.parse(localStorage.getItem(chaveRanking)) || [];
            const tabela = document.getElementById('tabela-ranking');
            const colunaCriterio = document.getElementById('coluna-criterio');
            tabela.innerHTML = "";

            if (filtroAtual === "pontos") {
